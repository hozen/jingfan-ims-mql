        <div style={{
          width:320, flexShrink:0,
          background:"#080D18",
          borderRight:"1px solid #141F30",
          overflowY:"auto",
          padding:"16px 0",
        }}>
          <div style={{ padding:"0 14px 14px", borderBottom:"1px solid #141F30" }}>
            <div style={{ fontSize:10, color:"#4A5E72", letterSpacing:3, marginBottom:8, textTransform:"uppercase" }}>按层级筛选</div>
            <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
              <button onClick={() => setActiveLayer(null)} style={{
                padding:"3px 10px", borderRadius:20, fontSize:11, cursor:"pointer",
                border:`1px solid ${activeLayer===null?"#C8922A":"#1A2E45"}`,
                background: activeLayer===null?"#C8922A22":"transparent",
                color: activeLayer===null?"#C8922A":"#5A6E85", transition:"all 0.2s",
              }}>全部</button>
              {layers.map(l => (
                <button key={l} onClick={() => setActiveLayer(activeLayer===l?null:l)} style={{
                  padding:"3px 10px", borderRadius:20, fontSize:11, cursor:"pointer",
                  border:`1px solid ${activeLayer===l?layerConfig[l].border:"#1A2E45"}`,
                  background: activeLayer===l?layerConfig[l].bg:"transparent",
                  color: activeLayer===l?layerConfig[l].border:"#5A6E85", transition:"all 0.2s",
                }}>{layerConfig[l].label}</button>
              ))}
            </div>
          </div>

          {layers.map(layer => {
            const group = filteredStakeholders.filter(s => s.layer === layer);
            if (group.length === 0) return null;
            const cfg = layerConfig[layer];
            return (
              <div key={layer}>
                <div style={{ padding:"10px 14px 5px", display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ color:cfg.border, fontSize:14 }}>{cfg.icon}</span>
                  <span style={{ fontSize:10, color:cfg.border, letterSpacing:3, textTransform:"uppercase" }}>{cfg.label}</span>
                  <span style={{ fontSize:10, color:"#3A4E60" }}>· {cfg.labelEn}</span>
                </div>
                {group.map(s => {
                  const isSelected = selected === s.id;
                  const itag = influenceTag[s.influence] || influenceTag["影响者"];
                  return (
                    <div key={s.id} onClick={() => { setSelected(s.id); setActiveTab("concerns"); }} style={{
                      margin:"3px 10px", padding:"10px 12px", borderRadius:8, cursor:"pointer",
                      border:`1px solid ${isSelected?s.color:"#141F30"}`,
                      background: isSelected?`${s.color}14`:"rgba(255,255,255,0.02)",
                      transition:"all 0.2s", position:"relative", overflow:"hidden",
                    }}>
                      {isSelected && <div style={{ position:"absolute", left:0, top:0, bottom:0, width:3, background:s.color, borderRadius:"2px 0 0 2px" }} />}
                      <div style={{ display:"flex", alignItems:"flex-start", gap:8 }}>
                        <span style={{ fontSize:18, lineHeight:1 }}>{s.icon}</span>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:12, fontWeight:600, color:isSelected?"#E8EDF5":"#B0BEC5", marginBottom:2 }}>{s.title_cn}</div>
                          <div style={{ fontSize:10, color:"#4A5E72", marginBottom:5 }}>{s.title_en}</div>
                          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                            <span style={{ fontSize:10, padding:"1px 7px", borderRadius:10, background:itag.bg, color:itag.color, border:`1px solid ${itag.border}` }}>{s.influence}</span>
                            <div style={{ flex:1, height:3, background:"#1A2E45", borderRadius:2 }}>
                              <div style={{ height:"100%", borderRadius:2, width:`${s.decisionWeight}%`, background:`linear-gradient(90deg, ${s.color}88, ${s.color})` }} />
                            </div>
                            <span style={{ fontSize:9, color:"#3A4E60" }}>{s.decisionWeight}%</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>

        {/* ── RIGHT: Detail panel ── */}
        <div style={{ flex:1, overflowY:"auto", padding:"20px 24px" }}>
          {!sel ? (
            <div style={{
              display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
              height:"100%", minHeight:360, gap:14, color:"#3A4E60",
            }}>
              <div style={{ fontSize:44 }}>◎</div>
              <div style={{ fontSize:14, letterSpacing:2 }}>请从左侧选择一个角色查看详细情报</div>
              <div style={{ fontSize:11, color:"#2A3E50" }}>Select a stakeholder to view intelligence details</div>
            </div>
          ) : (
            <div>
              {/* Detail header */}
              <div style={{
                background:"linear-gradient(135deg, #0D1B2E, #0A1628)",
                border:`1px solid ${sel.color}44`, borderRadius:12,
                padding:"20px 24px", marginBottom:16,
                position:"relative", overflow:"hidden",
              }}>
                <div style={{ position:"absolute", right:-20, top:-20, width:100, height:100, background:`radial-gradient(circle, ${sel.color}20, transparent 70%)` }} />
                <div style={{ display:"flex", alignItems:"flex-start", gap:14 }}>
                  <div style={{
                    width:52, height:52, borderRadius:12, flexShrink:0,
                    background:`${sel.color}18`, border:`1px solid ${sel.color}44`,
                    display:"flex", alignItems:"center", justifyContent:"center", fontSize:24,
                  }}>{sel.icon}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap", marginBottom:3 }}>
                      <h2 style={{ margin:0, fontSize:18, color:"#E8EDF5" }}>{sel.title_cn}</h2>
                      <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20, background:`${sel.color}22`, color:sel.color, border:`1px solid ${sel.color}44` }}>
                        {layerConfig[sel.layer].label}
                      </span>
                    </div>
                    <div style={{ fontSize:11, color:"#7A8EA8", marginBottom:10 }}>
                      {sel.title_en} &nbsp;·&nbsp; {sel.dept}
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
                      {(() => {
                        const itag = influenceTag[sel.influence] || influenceTag["影响者"];
                        return <span style={{ fontSize:12, padding:"3px 12px", borderRadius:20, background:itag.bg, color:itag.color, border:`1px solid ${itag.border}`, fontWeight:600 }}>{sel.influence}</span>;
                      })()}
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <span style={{ fontSize:11, color:"#4A5E72" }}>采购影响力</span>
                        <div style={{ width:90, height:6, background:"#1A2E45", borderRadius:3 }}>
                          <div style={{ height:"100%", borderRadius:3, width:`${sel.decisionWeight}%`, background:`linear-gradient(90deg, ${sel.color}66, ${sel.color})` }} />
                        </div>
                        <span style={{ fontSize:12, color:sel.color, fontWeight:600 }}>{sel.decisionWeight}%</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Tabs */}
              <div style={{ display:"flex", gap:4, marginBottom:14, flexWrap:"wrap" }}>
                {tabs.map(tab => (
                  <button key={tab.key} onClick={() => setActiveTab(tab.key)} style={{
                    padding:"7px 14px", borderRadius:8, fontSize:12, cursor:"pointer",
                    border:`1px solid ${activeTab===tab.key?sel.color:"#1A2E45"}`,
                    background: activeTab===tab.key?`${sel.color}18`:"transparent",
                    color: activeTab===tab.key?sel.color:"#5A6E85",
                    transition:"all 0.2s", display:"flex", alignItems:"center", gap:6,
                  }}>
                    <span>{tab.icon}</span>{tab.label}
                  </button>
                ))}
              </div>

              {/* Tab content */}
              <div style={{ background:"#0D1525", border:"1px solid #1A2E45", borderRadius:10, padding:"18px 20px" }}>
                {activeTab === "concerns" && (
                  <div>
                    <div style={{ fontSize:11, color:"#4A5E72", letterSpacing:3, marginBottom:12, textTransform:"uppercase" }}>◎ 核心关切 / 评估标准</div>
                    {sel.concerns.map((item, i) => (
                      <div key={i} style={{ display:"flex", gap:10, marginBottom:8, padding:"10px 12px", borderRadius:8, background:"#080D18", border:"1px solid #141F30" }}>
                        <div style={{ width:20, height:20, borderRadius:5, flexShrink:0, background:`${sel.color}22`, color:sel.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700 }}>{i+1}</div>
                        <div style={{ fontSize:13, color:"#B8C8D8", lineHeight:1.6 }}>{item}</div>
                      </div>
                    ))}
                  </div>
                )}
                {activeTab === "painPoints" && (
                  <div>
                    <div style={{ fontSize:11, color:"#4A5E72", letterSpacing:3, marginBottom:12, textTransform:"uppercase" }}>⚡ 关键痛点</div>
                    {sel.painPoints.map((item, i) => (
                      <div key={i} style={{ display:"flex", gap:10, marginBottom:8, padding:"10px 12px", borderRadius:8, background:"#0A0810", border:"1px solid #2A1428" }}>
                        <div style={{ color:"#E05555", fontSize:14, flexShrink:0, marginTop:2 }}>⚡</div>
                        <div style={{ fontSize:13, color:"#B8C8D8", lineHeight:1.6 }}>{item}</div>
                      </div>
                    ))}
                  </div>
                )}
                {activeTab === "hachValue" && (
                  <div>
                    <div style={{ fontSize:11, color:"#4A5E72", letterSpacing:3, marginBottom:12, textTransform:"uppercase" }}>✦ Hach 产品解决价值</div>
                    {sel.hachValue.map((item, i) => (
                      <div key={i} style={{ display:"flex", gap:10, marginBottom:8, padding:"10px 12px", borderRadius:8, background:"#080E14", border:`1px solid ${sel.color}33` }}>
                        <div style={{ color:sel.color, fontSize:14, flexShrink:0, marginTop:2 }}>✦</div>
                        <div style={{ fontSize:13, color:"#C8D8E8", lineHeight:1.6 }}>{item}</div>
                      </div>
                    ))}
                  </div>
                )}
                {activeTab === "channel" && (
                  <div>
                    <div style={{ fontSize:11, color:"#4A5E72", letterSpacing:3, marginBottom:12, textTransform:"uppercase" }}>➤ 最佳接触渠道</div>
                    {sel.channel.map((item, i) => (
                      <div key={i} style={{ display:"flex", gap:10, marginBottom:8, padding:"10px 14px", borderRadius:8, background:"#08120E", border:"1px solid #2E7D5244", alignItems:"center" }}>
                        <div style={{ width:26, height:26, borderRadius:"50%", flexShrink:0, background:"#2E7D5222", color:"#2E7D52", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700 }}>{i+1}</div>
                        <div style={{ fontSize:13, color:"#B8C8D8", lineHeight:1.6 }}>{item}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── FOOTER ── */}
      <div style={{
        background:"#080D18", borderTop:"1px solid #141F30",
        padding:"10px 24px", display:"flex", gap:16, alignItems:"center", flexWrap:"wrap",
      }}>
        <span style={{ fontSize:10, color:"#3A4E60", letterSpacing:2, textTransform:"uppercase" }}>采购影响力角色说明</span>
        {[
          { label:"决策者 Decision Maker", color:"#C8922A", desc:"最终批准权" },
          { label:"影响者 Influencer",     color:"#1E6B9E", desc:"技术评估推荐" },
          { label:"把关者 Gatekeeper",     color:"#2E7D52", desc:"流程合规控制" },
          { label:"使用者 User",           color:"#6B3FA0", desc:"实际操作反馈" },
        ].map(item => (
          <div key={item.label} style={{ display:"flex", alignItems:"center", gap:5 }}>
            <div style={{ width:7, height:7, borderRadius:"50%", background:item.color }} />
            <span style={{ fontSize:10, color:"#5A6E85" }}>{item.label}</span>
            <span style={{ fontSize:10, color:"#2A3E50" }}>· {item.desc}</span>
          </div>
        ))}
        <span style={{ marginLeft:"auto", fontSize:10, color:"#2A3E50" }}>Hach China · IMS Marketing Intelligence</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<StakeholderMap />);
</script>
</body>
</html>
